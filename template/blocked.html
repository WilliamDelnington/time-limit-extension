<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Time limit reached</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: #1a1a1a;
    }

    .card {
      background: #fff;
      border-radius: 20px;
      padding: 48px 44px;
      max-width: 480px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 32px rgba(0,0,0,0.08);
    }

    .icon { font-size: 56px; margin-bottom: 16px; }

    h1 {
      font-size: 22px;
      font-weight: 600;
      color: #1a1a1a;
      margin-bottom: 8px;
    }

    .domain {
      font-size: 15px;
      font-weight: 600;
      color: #c62828;
      background: #ffebee;
      display: inline-block;
      padding: 3px 10px;
      border-radius: 6px;
      margin-bottom: 16px;
    }

    .stats {
      display: flex;
      justify-content: center;
      gap: 32px;
      margin: 20px 0 28px;
    }

    .stat { display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .stat-value { font-size: 26px; font-weight: 600; color: #1565c0; }
    .stat-label { font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: .5px; }

    .divider { height: 1px; background: #f0f0f0; margin: 0 0 24px; }

    .actions { display: flex; flex-direction: column; gap: 10px; }

    button {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background .15s, opacity .15s;
    }

    .btn-primary   { background: #1565c0; color: #fff; }
    .btn-primary:hover   { background: #0d47a1; }

    .btn-warning {
      background: #fff3e0;
      color: #e65100;
      border: 1px solid #ffcc80;
    }
    .btn-warning:hover { background: #ffe0b2; }

    .btn-ghost {
      background: none;
      color: #888;
      border: 1px solid #e0e0e0;
      font-size: 13px;
    }
    .btn-ghost:hover { background: #f5f5f5; }

    /* Continue confirm dialog */
    #confirm-box {
      display: none;
      margin-top: 16px;
      background: #fff8f0;
      border: 1px solid #ffcc80;
      border-radius: 10px;
      padding: 16px;
      font-size: 13px;
      color: #5d4037;
      text-align: left;
    }

    #confirm-box.visible { display: block; }

    #confirm-box p { margin-bottom: 12px; line-height: 1.5; }

    .confirm-actions { display: flex; gap: 8px; }

    .confirm-actions button {
      flex: 1;
      padding: 8px;
      font-size: 13px;
    }

    .btn-confirm-yes { background: #e65100; color: #fff; }
    .btn-confirm-yes:hover { background: #bf360c; }
    .btn-confirm-no  { background: #f5f5f5; color: #333; border: 1px solid #ccc; }
    .btn-confirm-no:hover { background: #e0e0e0; }

    .footer-note {
      margin-top: 24px;
      font-size: 12px;
      color: #bbb;
    }

    .footer-note a {
      color: #90a4ae;
      text-decoration: none;
    }
    .footer-note a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🚫</div>
    <h1>Time limit reached</h1>
    <div class="domain" id="domain-label">this site</div>

    <div class="stats">
      <div class="stat">
        <span class="stat-value" id="stat-spent">—</span>
        <span class="stat-label">Used today</span>
      </div>
      <div class="stat">
        <span class="stat-value" id="stat-limit">—</span>
        <span class="stat-label">Daily limit</span>
      </div>
    </div>

    <div class="divider"></div>

    <div class="actions">
      <button class="btn-primary" id="btn-newtab">Open a new tab</button>
      <button class="btn-warning" id="btn-continue">Continue anyway…</button>
      <button class="btn-ghost" id="btn-settings">Adjust limit in settings</button>
    </div>

    <!-- Confirm continue dialog -->
    <div id="confirm-box">
      <p>
        This gives you <strong>10 more minutes</strong> on this site today.
        Are you sure you want to continue?
      </p>
      <div class="confirm-actions">
        <button class="btn-confirm-yes" id="btn-confirm-yes">Yes, continue</button>
        <button class="btn-confirm-no"  id="btn-confirm-no">No, go back</button>
      </div>
    </div>

    <p class="footer-note">
      Resets at midnight · <a href="#" id="link-settings">Manage limits</a>
    </p>
  </div>

  <script src="../scripts/blocked.js"></script>
</body>
</html>

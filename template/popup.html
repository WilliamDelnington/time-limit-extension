<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Time Limitter</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      color: #1a1a1a;
      background: #fff;
    }

    header {
      padding: 16px;
      border-bottom: 1px solid #eee;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    header h1 { font-size: 15px; font-weight: 600; }

    .live-badge {
      margin-left: auto;
      font-size: 11px;
      background: #e8f5e9;
      color: #2e7d32;
      padding: 2px 8px;
      border-radius: 99px;
    }

    .section { padding: 12px 16px; border-bottom: 1px solid #f0f0f0; }
    .section-title { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 8px; }

    /* Current session card */
    #current-session {
      background: #f8f8f8;
      border-radius: 8px;
      padding: 12px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    #session-domain { font-weight: 600; font-size: 13px; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    #session-elapsed { font-size: 12px; color: #555; min-width: 56px; text-align: right; }

    /* Usage list */
    .usage-list { display: flex; flex-direction: column; gap: 6px; }

    .usage-row {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .usage-meta {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
    }

    .usage-domain { font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 180px; }
    .usage-time   { color: #555; }

    .progress-bar {
      height: 4px;
      background: #eee;
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: #4caf50;
      border-radius: 2px;
      transition: width .4s;
    }

    .progress-fill.warning { background: #ff9800; }
    .progress-fill.exceeded { background: #f44336; }

    .empty-state { color: #aaa; font-size: 13px; text-align: center; padding: 8px 0; }

    footer { padding: 12px 16px; }
    footer a { font-size: 12px; color: #1565c0; text-decoration: none; }
    footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <header>
    <h1>⏱ Time Limitter</h1>
    <span class="live-badge" id="live-badge">● live</span>
  </header>

  <!-- Current session -->
  <div class="section">
    <div class="section-title">Now tracking</div>
    <div id="current-session">
      <div>
        <div id="session-domain">—</div>
        <div id="session-elapsed" style="font-size:11px;color:#888;margin-top:2px;">0s elapsed</div>
      </div>
    </div>
  </div>

  <!-- Today's group usage -->
  <div class="section">
    <div class="section-title">Group tracking</div>
    <div class="group-usage" id="group-usage">
      <div class="empty-state">Group activity not set.</div>
    </div>
  </div>

  <!-- Today's usage -->
  <div class="section">
    <div class="section-title">Today</div>
    <div class="usage-list" id="usage-list">
      <div class="empty-state">No activity yet today.</div>
    </div>
  </div>

  <footer>
    <a href="options.html" target="_blank">Manage limits →</a>
    <a href="dashboard.html" target="_blank" style="margin-left:12px;">Dashboard →</a>
  </footer>

  <script src="../scripts/popup.js"></script>
</body>
</html>
